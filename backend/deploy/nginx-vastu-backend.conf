# Reverse proxy for the Vastu Masterclass backend, running in Docker on
# 127.0.0.1:4001. Install as /etc/nginx/sites-available/vastu-backend, then
# symlink into sites-enabled and run `certbot --nginx -d apivastu.astrovastushrivmjoshi.com`.

server {
    listen 80;
    server_name apivastu.astrovastushrivmjoshi.com;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
